<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sphere position="0 1.25 -5" radius="1.25" color="white"></a-sphere>
      <a-sphere position="0 3 -5" radius="1.00" color="white"></a-sphere>
      <a-sphere position="0 4.5 -5" radius="0.7" color="white"></a-sphere>
      <a-sphere position="-0.08 2.25 -1" radius="0.03" color="black"></a-sphere>
      <a-sphere position="0.08 2.25 -1" radius="0.03" color="black"></a-sphere>
      <a-sphere position="-0.06 2.19 -0.9" radius="0.01" color="white"></a-sphere>
      <a-sphere position="0.06 2.19 -0.9" radius="0.01" color="white"></a-sphere>
      <a-cone position="0.0 2.22 -1" radius-bottom="0.03" height="0.2" rotation="110 0 0" color="#ED7117"></a-cone>
      <a-sphere position="0 2 -1" radius="0.02" color="pink"></a-sphere>
      <a-sphere position="0 1.9 -1" radius="0.02" color="pink"></a-sphere>
      <a-sphere position="0 1.7 -1" radius="0.02" color="pink"></a-sphere>
      <a-sphere position="0 1.6 -1" radius="0.02" color="pink"></a-sphere>
      <a-sphere position="0 1.5 -1" radius="0.02" color="pink"></a-sphere>
      <a-sky color="#CFE8FF"></a-sky>
      <a-plane position="0 0 -5" rotation="-90 0 0" width="50" height="50" color="#F5F5F5"></a-plane>
      <a-cone position="1.5 4 -7" radius-bottom="0.1" height="3" rotation="0 0 -120" color="#5A3E2B"></a-cone>
      <a-cone position="-1.5 4 -7" radius-bottom="0.1" height="3" rotation="0 0 120" color="#5A3E2B"></a-cone>
      <a-torus position="0 3.8 -5" radius="0.6" radius-tubular="0.08" color="pink" rotation="90 0 0"></a-torus>
      <a-sphere position="1 6 -5" radius="0.05" color="white" animation="property: position; to: 1 0 -5; loop: true; dur: 3000"></a-sphere>
      <a-sphere position="-2 7 -6" radius="0.05" color="white" animation="property: position; to: -2 0 -6; loop: true; dur: 2500"></a-sphere>
      <a-sphere position="0 8 -4" radius="0.05" color="white" animation="property: position; to: 0 0 -4; loop: true; dur: 2000"></a-sphere>
    </a-scene>
  </body>
</html>
